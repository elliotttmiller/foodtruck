<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#111827" />
    <meta name="description" content="Food Truck Command Center: sales, CRM, inventory, events, labor, vendors, expenses, reports, and QuickBooks-ready exports." />
    <title>Food Truck Command Center</title>
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="stylesheet" href="./styles.css" />
    <script>
      (function bootstrapCommandCenterStorage() {
        var key = 'ftcc.v1';
        try {
          var raw = window.localStorage.getItem(key);
          if (!raw) {
            window.localStorage.setItem(key, JSON.stringify({ settings: {} }));
            return;
          }
          JSON.parse(raw);
        } catch (error) {
          try {
            window.localStorage.setItem(key, JSON.stringify({ settings: {} }));
          } catch (ignored) {}
        }
      })();
    </script>
  </head>
  <body>
    <noscript>This command center requires JavaScript to run.</noscript>
    <div id="app" class="app-shell"></div>
    <script src="./app.js" type="module"></script>
  </body>
</html>
